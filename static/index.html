<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RustBlocker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #6ee7b7; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
        .spinner-lg { width: 24px; height: 24px; border-width: 3px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-3 flex items-center justify-between">
        <h1 class="text-xl font-bold text-emerald-400">RustBlocker</h1>
        <span id="status" class="text-sm text-gray-400">Loading...</span>
    </nav>

    <div class="max-w-6xl mx-auto p-6">
        <!-- Tabs -->
        <div class="flex gap-1 mb-6 border-b border-gray-700 overflow-x-auto">
            <button class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-emerald-400 text-emerald-400 whitespace-nowrap" data-tab="dashboard">Dashboard</button>
            <button class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-200 whitespace-nowrap" data-tab="upstreams">Upstreams</button>
            <button class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-200 whitespace-nowrap" data-tab="sources">Sources</button>
            <button class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-200 whitespace-nowrap" data-tab="blocklist">Blocklist</button>
            <button class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-200 whitespace-nowrap" data-tab="allowlist">Allowlist</button>
            <button class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-200 whitespace-nowrap" data-tab="rewrites">Rewrites</button>
            <button class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-200 whitespace-nowrap" data-tab="settings">Settings</button>
        </div>

        <!-- Dashboard -->
        <div id="tab-dashboard" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
                    <div class="text-sm text-gray-400">Blocked Domains</div>
                    <div id="stat-blocked" class="text-3xl font-bold text-red-400">-</div>
                </div>
                <div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
                    <div class="text-sm text-gray-400">Allowed Domains</div>
                    <div id="stat-allowed" class="text-3xl font-bold text-green-400">-</div>
                </div>
                <div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
                    <div class="text-sm text-gray-400">Rewrites</div>
                    <div id="stat-rewrites" class="text-3xl font-bold text-blue-400">-</div>
                </div>
                <div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
                    <div class="text-sm text-gray-400">Upstream Servers</div>
                    <div id="stat-upstreams" class="text-3xl font-bold text-purple-400">-</div>
                </div>
            </div>
            <div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-lg font-semibold">Auto-Update Sources</h2>
                    <button onclick="refreshAllSources()" id="refresh-all-btn" class="bg-yellow-600 hover:bg-yellow-700 px-3 py-1 rounded text-sm font-medium">Refresh All Now</button>
                </div>
                <div id="dashboard-sources" class="text-sm text-gray-300">Loading...</div>
            </div>
        </div>

        <!-- Upstreams -->
        <div id="tab-upstreams" class="tab-content hidden">
            <div class="flex gap-3 mb-4">
                <input id="upstream-address" type="text" placeholder="8.8.8.8" class="flex-1 bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
                <input id="upstream-port" type="number" placeholder="53" value="53" class="w-24 bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
                <button onclick="addUpstream()" class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded text-sm font-medium">Add Upstream</button>
            </div>
            <div id="upstream-count" class="text-sm text-gray-400 mb-2"></div>
            <div id="upstream-list" class="bg-gray-800 rounded-lg border border-gray-700 max-h-96 overflow-y-auto"></div>
        </div>

        <!-- Sources -->
        <div id="tab-sources" class="tab-content hidden">
            <p class="text-sm text-gray-400 mb-4">Manage blocklist/allowlist URLs. Sources are automatically refreshed on a schedule.</p>
            <div class="flex gap-3 mb-4">
                <input id="source-url" type="text" placeholder="https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts" class="flex-1 bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
                <select id="source-type" class="bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
                    <option value="blocklist">Blocklist</option>
                    <option value="allowlist">Allowlist</option>
                </select>
                <input id="source-interval" type="number" placeholder="24" value="24" title="Update interval (hours)" class="w-20 bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
                <button onclick="addSource()" id="add-source-btn" class="bg-yellow-600 hover:bg-yellow-700 px-4 py-2 rounded text-sm font-medium">Add Source</button>
            </div>
            <div id="source-status" class="text-sm mb-2"></div>
            <div class="flex justify-between items-center mb-2">
                <span id="source-count" class="text-sm text-gray-400"></span>
                <button onclick="refreshAllSources()" id="refresh-sources-btn" class="bg-yellow-600 hover:bg-yellow-700 px-3 py-1 rounded text-sm font-medium">Refresh All Now</button>
            </div>
            <div id="source-list" class="bg-gray-800 rounded-lg border border-gray-700 max-h-96 overflow-y-auto"></div>
        </div>

        <!-- Blocklist -->
        <div id="tab-blocklist" class="tab-content hidden">
            <div class="flex gap-3 mb-4">
                <input id="blocklist-input" type="text" placeholder="domain.com" class="flex-1 bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
                <button onclick="addDomain('blocklist')" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-sm font-medium">Block</button>
                <label class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm font-medium cursor-pointer">
                    Import File
                    <input type="file" class="hidden" onchange="importFile('blocklist', this)">
                </label>
            </div>
            <div class="flex gap-3 mb-4">
                <input id="blocklist-url" type="text" placeholder="https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts" class="flex-1 bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
                <button onclick="importUrl('blocklist')" id="blocklist-url-btn" class="bg-orange-600 hover:bg-orange-700 px-4 py-2 rounded text-sm font-medium">Import URL</button>
            </div>
            <div class="flex gap-3 mb-4">
                <input id="blocklist-search" type="text" placeholder="Search domains..." class="flex-1 bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
            </div>
            <div id="blocklist-status" class="text-sm mb-2"></div>
            <div id="blocklist-count" class="text-sm text-gray-400 mb-2"></div>
            <div id="blocklist-list" class="bg-gray-800 rounded-lg border border-gray-700 max-h-96 overflow-y-auto"></div>
            <div id="blocklist-pagination" class="flex justify-between items-center mt-3"></div>
        </div>

        <!-- Allowlist -->
        <div id="tab-allowlist" class="tab-content hidden">
            <div class="flex gap-3 mb-4">
                <input id="allowlist-input" type="text" placeholder="domain.com" class="flex-1 bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
                <button onclick="addDomain('allowlist')" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded text-sm font-medium">Allow</button>
                <label class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm font-medium cursor-pointer">
                    Import File
                    <input type="file" class="hidden" onchange="importFile('allowlist', this)">
                </label>
            </div>
            <div class="flex gap-3 mb-4">
                <input id="allowlist-url" type="text" placeholder="https://example.com/allowlist.txt" class="flex-1 bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
                <button onclick="importUrl('allowlist')" id="allowlist-url-btn" class="bg-orange-600 hover:bg-orange-700 px-4 py-2 rounded text-sm font-medium">Import URL</button>
            </div>
            <div class="flex gap-3 mb-4">
                <input id="allowlist-search" type="text" placeholder="Search domains..." class="flex-1 bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
            </div>
            <div id="allowlist-status" class="text-sm mb-2"></div>
            <div id="allowlist-count" class="text-sm text-gray-400 mb-2"></div>
            <div id="allowlist-list" class="bg-gray-800 rounded-lg border border-gray-700 max-h-96 overflow-y-auto"></div>
            <div id="allowlist-pagination" class="flex justify-between items-center mt-3"></div>
        </div>

        <!-- Rewrites -->
        <div id="tab-rewrites" class="tab-content hidden">
            <div class="flex gap-3 mb-4">
                <input id="rewrite-domain" type="text" placeholder="domain.com" class="flex-1 bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
                <input id="rewrite-ipv4" type="text" placeholder="IPv4" class="w-36 bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
                <input id="rewrite-ipv6" type="text" placeholder="IPv6" class="w-48 bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
                <button onclick="addRewrite()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm font-medium">Add</button>
            </div>
            <div id="rewrites-list" class="bg-gray-800 rounded-lg border border-gray-700 max-h-96 overflow-y-auto"></div>
        </div>

        <!-- Settings -->
        <div id="tab-settings" class="tab-content hidden">
            <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
                <h2 class="text-lg font-semibold mb-4">Server Settings</h2>
                <div id="settings-form" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                <button onclick="saveSettings()" class="mt-4 bg-emerald-600 hover:bg-emerald-700 px-6 py-2 rounded text-sm font-medium">Save Settings</button>
                <span id="settings-status" class="ml-3 text-sm text-gray-400"></span>
            </div>
        </div>
    </div>

    <script>
    const API = '/api';
    const PAGE_SIZE = 50;
    const state = { blocklist: {offset:0, search:''}, allowlist: {offset:0, search:''} };

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('border-emerald-400', 'text-emerald-400');
                b.classList.add('border-transparent', 'text-gray-400');
            });
            btn.classList.add('border-emerald-400', 'text-emerald-400');
            btn.classList.remove('border-transparent', 'text-gray-400');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
            loadTab(btn.dataset.tab);
        });
    });

    async function loadTab(tab) {
        switch(tab) {
            case 'dashboard': return loadDashboard();
            case 'upstreams': return loadUpstreams();
            case 'sources': return loadSources();
            case 'blocklist': return loadDomainList('blocklist');
            case 'allowlist': return loadDomainList('allowlist');
            case 'rewrites': return loadRewrites();
            case 'settings': return loadSettings();
        }
    }

    // --- Dashboard ---

    async function loadDashboard() {
        const [blocklist, allowlist, rewrites, upstreams, sources] = await Promise.all([
            fetch(API + '/blocklist?limit=0').then(r => r.json()),
            fetch(API + '/allowlist?limit=0').then(r => r.json()),
            fetch(API + '/rewrites').then(r => r.json()),
            fetch(API + '/upstreams').then(r => r.json()),
            fetch(API + '/sources').then(r => r.json()),
        ]);
        document.getElementById('stat-blocked').textContent = blocklist.total;
        document.getElementById('stat-allowed').textContent = allowlist.total;
        document.getElementById('stat-rewrites').textContent = rewrites.length;
        document.getElementById('stat-upstreams').textContent = upstreams.length;

        const srcDiv = document.getElementById('dashboard-sources');
        if (!sources.length) {
            srcDiv.innerHTML = '<div class="text-gray-500">No auto-update sources configured.</div>';
        } else {
            srcDiv.innerHTML = sources.map(s =>
                `<div class="flex items-center justify-between py-1 border-b border-gray-700 last:border-0">
                    <span class="font-mono text-xs truncate max-w-md">${s.url}</span>
                    <span class="text-xs px-2 py-0.5 rounded ${s.last_status && s.last_status.startsWith('ok') ? 'bg-green-900 text-green-300' : s.last_status ? 'bg-red-900 text-red-300' : 'bg-gray-700 text-gray-400'}">${s.last_status || 'pending'}</span>
                </div>`
            ).join('');
        }
    }

    // --- Upstreams ---

    async function loadUpstreams() {
        const data = await fetch(API + '/upstreams').then(r => r.json());
        document.getElementById('upstream-count').textContent = data.length + ' servers';
        const list = document.getElementById('upstream-list');
        if (!data.length) {
            list.innerHTML = '<div class="p-4 text-gray-500 text-sm">No upstream servers configured</div>';
            return;
        }
        list.innerHTML = data.map(u =>
            `<div class="flex items-center justify-between px-4 py-2 border-b border-gray-700 last:border-0">
                <span class="font-mono text-sm">${u.address}:${u.port}</span>
                <button onclick="deleteUpstream(${u.id})" class="text-red-400 hover:text-red-300 text-xs">Remove</button>
            </div>`
        ).join('');
    }

    async function addUpstream() {
        const address = document.getElementById('upstream-address').value.trim();
        const port = parseInt(document.getElementById('upstream-port').value) || 53;
        if (!address) return;
        await fetch(API + '/upstreams', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({address, port})
        });
        document.getElementById('upstream-address').value = '';
        document.getElementById('upstream-port').value = '53';
        loadUpstreams();
    }

    async function deleteUpstream(id) {
        await fetch(API + '/upstreams/' + id, {method: 'DELETE'});
        loadUpstreams();
    }

    // --- Sources ---

    async function loadSources() {
        const data = await fetch(API + '/sources').then(r => r.json());
        document.getElementById('source-count').textContent = data.length + ' source(s)';
        const list = document.getElementById('source-list');
        if (!data.length) {
            list.innerHTML = '<div class="p-4 text-gray-500 text-sm">No sources configured.</div>';
            return;
        }
        list.innerHTML = data.map(s =>
            `<div class="px-4 py-3 border-b border-gray-700 last:border-0">
                <div class="flex items-center justify-between mb-1">
                    <span class="font-mono text-sm truncate max-w-lg">${s.url}</span>
                    <button onclick="deleteSource(${s.id})" class="text-red-400 hover:text-red-300 text-xs ml-2">Remove</button>
                </div>
                <div class="flex gap-4 text-xs text-gray-400">
                    <span>Type: <span class="text-gray-300">${s.list_type}</span></span>
                    <span>Every: <span class="text-gray-300">${s.update_interval_hours}h</span></span>
                    <span>Last: <span class="${s.last_status && s.last_status.startsWith('ok') ? 'text-green-400' : s.last_status ? 'text-red-400' : 'text-gray-500'}">${s.last_updated || 'never'}</span></span>
                    <span>Status: <span class="${s.last_status && s.last_status.startsWith('ok') ? 'text-green-400' : s.last_status ? 'text-red-400' : 'text-gray-500'}">${s.last_status || 'pending'}</span></span>
                </div>
            </div>`
        ).join('');
    }

    async function addSource() {
        const url = document.getElementById('source-url').value.trim();
        if (!url) return;
        const list_type = document.getElementById('source-type').value;
        const interval = parseInt(document.getElementById('source-interval').value) || 24;
        const btn = document.getElementById('add-source-btn');
        const status = document.getElementById('source-status');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Adding...';
        status.innerHTML = '<span class="spinner spinner-lg"></span> Fetching and importing...';
        status.className = 'text-sm text-emerald-400 mb-2';
        const resp = await fetch(API + '/sources', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({url, list_type, update_interval_hours: interval})
        });
        const result = await resp.json();
        btn.disabled = false;
        btn.innerHTML = 'Add Source';
        status.innerHTML = '';
        status.className = 'text-sm mb-2';
        showSourceStatus(resp.ok ? `Added! ${result.status}` : `Error: ${result.error || 'failed'}`, resp.ok);
        document.getElementById('source-url').value = '';
        loadSources();
    }

    async function deleteSource(id) {
        await fetch(API + '/sources/' + id, {method: 'DELETE'});
        loadSources();
    }

    async function refreshAllSources() {
        const btn = document.getElementById('refresh-all-btn') || document.getElementById('refresh-sources-btn');
        if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Refreshing...'; }
        const status = document.getElementById('source-status');
        if (status) { status.innerHTML = '<span class="spinner spinner-lg"></span> Refreshing all sources...'; status.className = 'text-sm text-emerald-400 mb-2'; }
        const resp = await fetch(API + '/sources/refresh', {method: 'POST'});
        const result = await resp.json();
        if (btn) { btn.disabled = false; btn.innerHTML = 'Refresh All Now'; }
        if (status) { status.innerHTML = ''; status.className = 'text-sm mb-2'; }
        showSourceStatus(`Refreshed ${result.refreshed} source(s)`, true);
        loadSources();
    }

    function showSourceStatus(msg, ok) {
        const status = document.getElementById('source-status');
        if (!status) return;
        status.textContent = msg;
        status.className = 'text-sm mb-2 ' + (ok ? 'text-emerald-400' : 'text-red-400');
        setTimeout(() => { status.textContent = ''; status.className = 'text-sm mb-2'; }, 5000);
    }

    // --- Domains (blocklist / allowlist) ---

    async function loadDomainList(type) {
        const s = state[type];
        const params = new URLSearchParams({limit: PAGE_SIZE, offset: s.offset});
        if (s.search) params.set('search', s.search);
        const resp = await fetch(API + '/' + type + '?' + params);
        const data = await resp.json();
        const domains = data.domains || [];
        const total = data.total || 0;

        document.getElementById(type + '-count').textContent =
            s.search ? `${domains.length} matches (${total} total)` : `${total} domains`;

        const list = document.getElementById(type + '-list');
        if (!domains.length) {
            list.innerHTML = `<div class="p-4 text-gray-500 text-sm">${s.search ? 'No matches' : 'No domains'}</div>`;
        } else {
            list.innerHTML = domains.map(d =>
                `<div class="flex items-center justify-between px-4 py-2 border-b border-gray-700 last:border-0">
                    <span class="font-mono text-sm">${d.domain}</span>
                    <button onclick="deleteDomain('${type}', ${d.id})" class="text-red-400 hover:text-red-300 text-xs">Remove</button>
                </div>`
            ).join('');
        }

        const pag = document.getElementById(type + '-pagination');
        const prevDisabled = s.offset <= 0 ? 'disabled opacity-50' : '';
        const nextDisabled = s.offset + PAGE_SIZE >= total ? 'disabled opacity-50' : '';
        pag.innerHTML = `
            <button onclick="pageDomain('${type}', -PAGE_SIZE)" class="bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded text-sm ${prevDisabled}">Prev</button>
            <span class="text-sm text-gray-400">${s.offset + 1}–${Math.min(s.offset + PAGE_SIZE, total)} of ${total}</span>
            <button onclick="pageDomain('${type}', PAGE_SIZE)" class="bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded text-sm ${nextDisabled}">Next</button>
        `;
    }

    function pageDomain(type, delta) {
        state[type].offset = Math.max(0, state[type].offset + delta);
        loadDomainList(type);
    }

    async function addDomain(type) {
        const input = document.getElementById(type + '-input');
        const domain = input.value.trim();
        if (!domain) return;
        await fetch(API + '/' + type, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({domain})
        });
        input.value = '';
        state[type].offset = 0;
        state[type].search = '';
        loadDomainList(type);
    }

    async function deleteDomain(type, id) {
        await fetch(API + '/' + type + '/' + id, {method: 'DELETE'});
        loadDomainList(type);
    }

    async function importFile(type, input) {
        const file = input.files[0];
        if (!file) return;
        const status = document.getElementById(type + '-status');
        status.innerHTML = '<span class="spinner"></span> Importing file...';
        status.className = 'text-sm text-emerald-400 mb-2';
        const content = await file.text();
        const resp = await fetch(API + '/' + type + '/import', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({content})
        });
        const result = await resp.json();
        status.innerHTML = '';
        status.className = 'text-sm mb-2';
        showStatus(type, 'Imported ' + (result.imported || 0) + ' domains');
        input.value = '';
        state[type].offset = 0;
        loadDomainList(type);
    }

    async function importUrl(type) {
        const urlInput = document.getElementById(type + '-url');
        const url = urlInput.value.trim();
        if (!url) return;
        const btn = document.getElementById(type + '-url-btn');
        const status = document.getElementById(type + '-status');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Fetching...';
        status.innerHTML = '<span class="spinner spinner-lg"></span> Fetching blocklist from URL...';
        status.className = 'text-sm text-emerald-400 mb-2';
        const resp = await fetch(API + '/' + type + '/import', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({url})
        });
        const result = await resp.json();
        btn.disabled = false;
        btn.innerHTML = 'Import URL';
        status.innerHTML = '';
        status.className = 'text-sm mb-2';
        if (resp.ok) {
            showStatus(type, 'Imported ' + (result.imported || 0) + ' domains from URL');
            urlInput.value = '';
        } else {
            showStatus(type, 'Error: ' + (result.error || 'import failed'), true);
        }
        state[type].offset = 0;
        loadDomainList(type);
    }

    function showStatus(type, msg, isError) {
        const status = document.getElementById(type + '-status');
        if (!status) return;
        status.textContent = msg;
        status.className = 'text-sm mb-2 ' + (isError ? 'text-red-400' : 'text-emerald-400');
        setTimeout(() => { status.textContent = ''; status.className = 'text-sm mb-2'; }, 5000);
    }

    let searchTimers = {};
    function onSearch(type) {
        clearTimeout(searchTimers[type]);
        searchTimers[type] = setTimeout(() => {
            state[type].search = document.getElementById(type + '-search').value.trim();
            state[type].offset = 0;
            loadDomainList(type);
        }, 300);
    }

    // --- Rewrites ---

    async function loadRewrites() {
        const data = await fetch(API + '/rewrites').then(r => r.json());
        const list = document.getElementById('rewrites-list');
        if (!data.length) {
            list.innerHTML = '<div class="p-4 text-gray-500 text-sm">No rewrites</div>';
            return;
        }
        list.innerHTML = data.map(r =>
            `<div class="flex items-center justify-between px-4 py-2 border-b border-gray-700 last:border-0">
                <span class="font-mono text-sm">${r.domain} &rarr; ${r.ipv4 || '-'} ${r.ipv6 || ''}</span>
                <button onclick="deleteRewrite(${r.id})" class="text-red-400 hover:text-red-300 text-xs">Remove</button>
            </div>`
        ).join('');
    }

    async function addRewrite() {
        const domain = document.getElementById('rewrite-domain').value.trim();
        const ipv4 = document.getElementById('rewrite-ipv4').value.trim() || null;
        const ipv6 = document.getElementById('rewrite-ipv6').value.trim() || null;
        if (!domain) return;
        await fetch(API + '/rewrites', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({domain, ipv4, ipv6})
        });
        document.getElementById('rewrite-domain').value = '';
        document.getElementById('rewrite-ipv4').value = '';
        document.getElementById('rewrite-ipv6').value = '';
        loadRewrites();
    }

    async function deleteRewrite(id) {
        await fetch(API + '/rewrites/' + id, {method: 'DELETE'});
        loadRewrites();
    }

    // --- Settings ---

    async function loadSettings() {
        const data = await fetch(API + '/settings').then(r => r.json());
        const form = document.getElementById('settings-form');
        const fields = [
            {key: 'listen_address', label: 'Listen Address'},
            {key: 'listen_port', label: 'DNS Port'},
            {key: 'sinkhole_ipv4', label: 'Sinkhole IPv4'},
            {key: 'sinkhole_ipv6', label: 'Sinkhole IPv6'},
            {key: 'log_level', label: 'Log Level'},
            {key: 'upstream_timeout_secs', label: 'Upstream Timeout (s)'},
            {key: 'allowed_networks', label: 'Allowed Networks (CIDR, comma-separated)'},
        ];
        form.innerHTML = fields.map(f => {
            if (f.key === 'allowed_networks') {
                return `<div class="md:col-span-2">
                    <label class="block text-sm text-gray-400 mb-1">${f.label}</label>
                    <textarea id="setting-${f.key}" rows="2" placeholder="192.168.0.0/24, 10.0.0.0/22 (empty = allow all)"
                        class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">${data[f.key] || ''}</textarea>
                </div>`;
            }
            return `<div>
                <label class="block text-sm text-gray-400 mb-1">${f.label}</label>
                <input id="setting-${f.key}" type="text" value="${data[f.key] || ''}"
                    class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-emerald-500">
            </div>`;
        }).join('');
    }

    async function saveSettings() {
        const keys = ['listen_address', 'listen_port', 'sinkhole_ipv4', 'sinkhole_ipv6', 'log_level', 'upstream_timeout_secs', 'allowed_networks'];
        for (const key of keys) {
            const el = document.getElementById('setting-' + key);
            if (el) {
                await fetch(API + '/settings', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({key, value: el.value})
                });
            }
        }
        const status = document.getElementById('settings-status');
        status.textContent = 'Saved! Restart to apply.';
        setTimeout(() => status.textContent = '', 3000);
    }

    // --- Health ---

    async function checkHealth() {
        try {
            const r = await fetch(API + '/health');
            await r.json();
            document.getElementById('status').textContent = 'Online';
            document.getElementById('status').className = 'text-sm text-green-400';
        } catch {
            document.getElementById('status').textContent = 'Offline';
            document.getElementById('status').className = 'text-sm text-red-400';
        }
    }

    // --- Key bindings ---

    document.getElementById('blocklist-input').addEventListener('keydown', e => { if (e.key === 'Enter') addDomain('blocklist'); });
    document.getElementById('allowlist-input').addEventListener('keydown', e => { if (e.key === 'Enter') addDomain('allowlist'); });
    document.getElementById('upstream-address').addEventListener('keydown', e => { if (e.key === 'Enter') addUpstream(); });
    document.getElementById('blocklist-url').addEventListener('keydown', e => { if (e.key === 'Enter') importUrl('blocklist'); });
    document.getElementById('allowlist-url').addEventListener('keydown', e => { if (e.key === 'Enter') importUrl('allowlist'); });
    document.getElementById('source-url').addEventListener('keydown', e => { if (e.key === 'Enter') addSource(); });
    document.getElementById('blocklist-search').addEventListener('input', () => onSearch('blocklist'));
    document.getElementById('allowlist-search').addEventListener('input', () => onSearch('allowlist'));

    checkHealth();
    loadDashboard();
    </script>
</body>
</html>
